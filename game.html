<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaga Arcade</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 80px 16px 32px;
    }

    .top-nav {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid #3af5ff;
      border-radius: 999px;
      z-index: 10;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .top-nav a {
      border: none;
      color: #3af5ff;
      padding: 4px 8px;
      text-decoration: none;
    }

    .top-nav a.active {
      color: #ffeb3b;
      text-decoration: underline;
    }

    .section {
      width: 100%;
      max-width: 960px;
      border: 4px solid #3af5ff;
      border-radius: 12px;
      padding: 24px;
      background: radial-gradient(circle at center, #050505 0, #000 60%, #000 100%);
      box-shadow: 0 0 18px rgba(58, 245, 255, 0.4);
    }

    .game-title {
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #ffeb3b;
      text-align: center;
      text-shadow:
        0 0 4px #ffeb3b,
        0 0 12px #ffeb3b;
      margin-bottom: 16px;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .game-info {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 800px;
      color: #3af5ff;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    #gameCanvas {
      border: 2px solid #3af5ff;
      border-radius: 8px;
      background: #000;
      box-shadow: 0 0 20px rgba(58, 245, 255, 0.5);
      cursor: none;
    }

    .game-controls {
      text-align: center;
      color: #9e9e9e;
      font-size: 0.85rem;
    }

    .game-controls p {
      margin: 5px 0;
    }

    @media (max-width: 820px) {
      body {
        padding-top: 100px;
      }

      #gameCanvas {
        width: 100%;
        height: auto;
      }

      .game-info {
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a href="index.html#section-1">About</a>
    <a href="index.html#section-2">Services</a>
    <a href="index.html#section-3">Contact</a>
  </nav>

  <main class="section">
    <h1 class="game-title">Galaga</h1>
    <div class="game-container">
      <div class="game-info">
        <div>Score: <span id="score">0</span></div>
        <div>Lives: <span id="lives">3</span></div>
        <div>Level: <span id="level">1</span></div>
      </div>
      <canvas id="gameCanvas" width="800" height="600"></canvas>
      <div class="game-controls">
        <p><strong>Controls:</strong> Arrow Keys to move, Spacebar to shoot</p>
        <p id="gameStatus">Press SPACE to start</p>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', initGalaga);

    function initGalaga() {
      const canvas = document.getElementById('gameCanvas');
      if (!canvas) return;

      const ctx = canvas.getContext('2d');
      let gameState = 'waiting';
      let score = 0;
      let lives = 3;
      let level = 1;
      const keys = {};

      const player = {
        x: canvas.width / 2,
        y: canvas.height - 50,
        width: 40,
        height: 30,
        speed: 5,
        color: '#3af5ff'
      };

      let playerBullets = [];
      let enemyBullets = [];
      let enemies = [];
      const enemyRows = 5;
      const enemyCols = 10;
      let enemyDirection = 1;
      let enemySpeed = 1;
      const enemyDropSpeed = 20;

      const stars = [];
      for (let i = 0; i < 100; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: Math.random() * 2,
          speed: Math.random() * 2 + 0.5
        });
      }

      function initEnemies() {
        enemies = [];
        const startX = 50;
        const startY = 50;
        const spacing = 60;

        for (let row = 0; row < enemyRows; row++) {
          for (let col = 0; col < enemyCols; col++) {
            enemies.push({
              x: startX + col * spacing,
              y: startY + row * spacing,
              width: 30,
              height: 30,
              color: row === 0 ? '#ff6b6b' : row < 3 ? '#ffeb3b' : '#4ecdc4',
              alive: true,
              shootCooldown: Math.random() * 200 + 100
            });
          }
        }
      }

      initEnemies();

      document.addEventListener('keydown', handleKeyDown);
      document.addEventListener('keyup', handleKeyUp);

      function handleKeyDown(e) {
        keys[e.key] = true;

        if (e.key === ' ') {
          if (gameState === 'waiting') {
            gameState = 'playing';
            document.getElementById('gameStatus').textContent = '';
          } else if (gameState === 'playing') {
            shoot();
          } else if (gameState === 'gameover') {
            restart();
          }
        }
      }

      function handleKeyUp(e) {
        keys[e.key] = false;
      }

      function shoot() {
        playerBullets.push({
          x: player.x + player.width / 2 - 2,
          y: player.y,
          width: 4,
          height: 10,
          speed: 8,
          color: '#ffeb3b'
        });
      }

      function update() {
        if (gameState !== 'playing') return;

        stars.forEach(star => {
          star.y += star.speed;
          if (star.y > canvas.height) {
            star.y = 0;
            star.x = Math.random() * canvas.width;
          }
        });

        if (keys['ArrowLeft'] && player.x > 0) {
          player.x -= player.speed;
        }
        if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
          player.x += player.speed;
        }

        playerBullets = playerBullets.filter(bullet => {
          bullet.y -= bullet.speed;

          for (const enemy of enemies) {
            if (enemy.alive &&
              bullet.x < enemy.x + enemy.width &&
              bullet.x + bullet.width > enemy.x &&
              bullet.y < enemy.y + enemy.height &&
              bullet.y + bullet.height > enemy.y) {
              enemy.alive = false;
              score += 100;
              document.getElementById('score').textContent = score;
              return false;
            }
          }

          return bullet.y > 0;
        });

        let shouldDrop = false;
        let maxX = 0;
        let minX = canvas.width;

        enemies.forEach(enemy => {
          if (enemy.alive) {
            maxX = Math.max(maxX, enemy.x + enemy.width);
            minX = Math.min(minX, enemy.x);
          }
        });

        if (maxX >= canvas.width || minX <= 0) {
          enemyDirection *= -1;
          shouldDrop = true;
        }

        enemies.forEach(enemy => {
          if (enemy.alive) {
            enemy.x += enemySpeed * enemyDirection;
            if (shouldDrop) {
              enemy.y += enemyDropSpeed;
            }

            enemy.shootCooldown--;
            if (enemy.shootCooldown <= 0 && Math.random() < 0.01) {
              enemyBullets.push({
                x: enemy.x + enemy.width / 2,
                y: enemy.y + enemy.height,
                width: 4,
                height: 10,
                speed: 3,
                color: '#ff6b6b'
              });
              enemy.shootCooldown = Math.random() * 200 + 100;
            }

            if (enemy.y + enemy.height >= player.y) {
              gameOver();
            }
          }
        });

        enemyBullets = enemyBullets.filter(bullet => {
          bullet.y += bullet.speed;

          if (bullet.x < player.x + player.width &&
            bullet.x + bullet.width > player.x &&
            bullet.y < player.y + player.height &&
            bullet.y + bullet.height > player.y) {
            lives--;
            document.getElementById('lives').textContent = lives;
            if (lives <= 0) {
              gameOver();
            }
            return false;
          }

          return bullet.y < canvas.height;
        });

        if (!enemies.some(e => e.alive)) {
          level++;
          document.getElementById('level').textContent = level;
          enemySpeed += 0.5;
          initEnemies();
        }
      }

      function gameOver() {
        gameState = 'gameover';
        document.getElementById('gameStatus').textContent = 'Game Over! Press SPACE to restart';
      }

      function restart() {
        score = 0;
        lives = 3;
        level = 1;
        enemySpeed = 1;
        playerBullets = [];
        enemyBullets = [];
        player.x = canvas.width / 2;
        document.getElementById('score').textContent = score;
        document.getElementById('lives').textContent = lives;
        document.getElementById('level').textContent = level;
        initEnemies();
        gameState = 'waiting';
        document.getElementById('gameStatus').textContent = 'Press SPACE to start';
      }

      function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#fff';
        stars.forEach(star => {
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
          ctx.fill();
        });

        if (gameState === 'playing' || gameState === 'gameover') {
          ctx.fillStyle = player.color;
          ctx.beginPath();
          ctx.moveTo(player.x + player.width / 2, player.y);
          ctx.lineTo(player.x, player.y + player.height);
          ctx.lineTo(player.x + player.width / 4, player.y + player.height * 0.7);
          ctx.lineTo(player.x + player.width * 3 / 4, player.y + player.height * 0.7);
          ctx.lineTo(player.x + player.width, player.y + player.height);
          ctx.closePath();
          ctx.fill();

          playerBullets.forEach(bullet => {
            ctx.fillStyle = bullet.color;
            ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
          });

          enemies.forEach(enemy => {
            if (enemy.alive) {
              ctx.fillStyle = enemy.color;
              ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
              ctx.fillStyle = '#000';
              ctx.fillRect(enemy.x + 5, enemy.y + 5, enemy.width - 10, enemy.height - 10);
            }
          });

          enemyBullets.forEach(bullet => {
            ctx.fillStyle = bullet.color;
            ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
          });
        }
      }

      function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
      }

      gameLoop();
    }
  </script>
</body>
</html>
